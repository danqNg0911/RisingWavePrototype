services:
  redpanda:
    image: ${REDPANDA_IMAGE}
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:9092"
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  risingwave:
    image: ${RISINGWAVE_IMAGE}
    command: ["single_node", "--in-memory"]
    ports:
      - "4566:4566"
      - "5691:5691"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/4566'"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 30s

  generator:
    build:
      context: ./services/generator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      EVENTS_PER_SECOND: ${EVENTS_PER_SECOND}
      RUN_SECONDS: ${RUN_SECONDS}
      GENERATOR_SEED: ${GENERATOR_SEED}
    depends_on:
      redpanda:
        condition: service_healthy

  ai_scorer:
    build:
      context: ./services/ai_scorer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      RISINGWAVE_DSN: ${RISINGWAVE_DSN}
      AI_MODE: ${AI_MODE}
      HF_TOKEN: ${HF_TOKEN}
      HF_MODEL_ID: ${HF_MODEL_ID:-facebook/bart-large-mnli}
      HF_PROVIDER_POLICY: ${HF_PROVIDER_POLICY:-preferred}
      RISK_THRESHOLD_WARNING: ${RISK_THRESHOLD_WARNING}
      RISK_THRESHOLD_NOTIFY: ${RISK_THRESHOLD_NOTIFY}
      RISK_THRESHOLD_BLOCK: ${RISK_THRESHOLD_BLOCK}
    depends_on:
      redpanda:
        condition: service_healthy
      risingwave:
        condition: service_healthy

  rpa_worker:
    build:
      context: ./services/rpa_worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      RISINGWAVE_DSN: ${RISINGWAVE_DSN}
      RPA_MODE: ${RPA_MODE:-openflow_queue}
      OPENFLOW_URL: ${OPENFLOW_URL}
      OPENFLOW_USERNAME: ${OPENFLOW_USERNAME}
      OPENFLOW_PASSWORD: ${OPENFLOW_PASSWORD}
      OPENFLOW_TOKEN: ${OPENFLOW_TOKEN}
      OPENRPA_QUEUE_NAME: ${OPENRPA_QUEUE_NAME:-risingwave_rpa_decisions}
      OPENRPA_ENTRY_WORKFLOW: ${OPENRPA_ENTRY_WORKFLOW}
      OPENFLOW_MAX_DISPATCH_RETRIES: ${OPENFLOW_MAX_DISPATCH_RETRIES:-6}
      OPENFLOW_BACKLOG_BATCH_SIZE: ${OPENFLOW_BACKLOG_BATCH_SIZE:-3}
      RISK_THRESHOLD_WARNING: ${RISK_THRESHOLD_WARNING}
      RISK_THRESHOLD_NOTIFY: ${RISK_THRESHOLD_NOTIFY}
      RISK_THRESHOLD_BLOCK: ${RISK_THRESHOLD_BLOCK}
    depends_on:
      redpanda:
        condition: service_healthy
      risingwave:
        condition: service_healthy

  dashboard:
    build:
      context: ./services/dashboard
    environment:
      RISINGWAVE_DSN: ${RISINGWAVE_DSN}
    ports:
      - "8501:8501"
    depends_on:
      risingwave:
        condition: service_healthy
